<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知信 · 登录</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400..600&family=Noto+Sans+SC:wght@400;500;700&family=Playfair+Display:ital,wght@0,500;0,700;1,500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../colors_and_type.css">
    <style>
*,::before,::after{box-sizing:border-box}
body{font-family:'Inter','Noto Sans SC',sans-serif;background:var(--color-bg);color:var(--color-text);margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-container{width:100%;max-width:430px;padding:24px}
.login-card{background:#fff;border:1px solid #e2e4e9;border-radius:16px;padding:40px 32px}
.login-logo{text-align:center;margin-bottom:12px;font-family:'Playfair Display',serif;font-size:28px;font-weight:700;margin-top:0}
.login-logo .dot{color:var(--color-primary)}
.login-subtitle{text-align:center;color:var(--color-secondary);font-size:14px;margin-bottom:32px}
.form-group{margin-bottom:20px}
.form-label{display:block;font-size:13px;font-weight:500;margin-bottom:6px;color:var(--color-text)}
.form-input{width:100%;padding:10px 14px;border:1px solid #e2e4e9;border-radius:8px;font-size:15px;font-family:inherit;color:var(--color-text);transition:border-color .2s,box-shadow .2s;outline:none;background:#fff}
.form-input:focus{border-color:var(--color-primary);box-shadow:0 0 0 3px rgba(0,154,252,.15)}
.form-input.has-error{border-color:#ef4444}
.error-msg{display:none;color:#ef4444;font-size:12px;margin-top:4px}
.form-input.has-error + .error-msg{display:block}
.form-submit{width:100%;background:var(--color-primary);color:#fff;border:none;border-radius:8px;padding:12px;font-size:15px;font-weight:500;cursor:pointer;margin-top:4px;transition:background .2s;font-family:inherit}
.form-submit:hover{background:#0088e0}
.form-submit:disabled{opacity:.5;cursor:not-allowed}
.form-submit.loading{pointer-events:none}
.login-footer{text-align:center;margin-top:16px;font-size:13px;color:var(--color-secondary)}
.login-footer a{color:var(--color-primary);text-decoration:none}
.social-login{text-align:center;margin-top:24px;position:relative}
.social-login::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#e2e4e9;z-index:0}
.social-login span{position:relative;z-index:1;background:#fff;padding:0 16px;font-size:13px;color:var(--color-placeholder)}
.social-buttons{display:flex;gap:8px;margin-top:16px}
.social-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:8px;border:1px solid #e2e4e9;border-radius:8px;background:#fff;cursor:pointer;font-size:13px;transition:border-color .15s;font-family:inherit;color:var(--color-text)}
.social-btn:hover{border-color:var(--color-primary)}
.tab-switcher{display:flex;margin-bottom:28px;background:#f1f2f4;border-radius:8px;padding:4px}
.tab-btn{flex:1;padding:8px;border:none;background:transparent;font-size:14px;color:var(--color-secondary);cursor:pointer;border-radius:6px;transition:all .2s;font-family:inherit}
.tab-btn.active{background:#fff;color:var(--color-text);box-shadow:0 1px 3px rgba(0,0,0,.08)}
#confirmPasswordGroup{display:none}
@media (max-width:480px){.login-card{padding:32px 24px}}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h1 class="login-logo">知信<span class="dot">·</span></h1>
            <p class="login-subtitle">让信息像好文章一样自然流入大脑</p>
            
            <div class="tab-switcher">
                <button class="tab-btn active" id="tabLogin">登录</button>
                <button class="tab-btn" id="tabRegister">注册</button>
            </div>
            
            <form id="authForm">
                <div class="form-group">
                    <label class="form-label" for="email">邮箱</label>
                    <input type="email" id="email" class="form-input" placeholder="name@example.com" required>
                    <span class="error-msg" id="emailError">请输入有效的邮箱地址</span>
                </div>
                
                <div class="form-group">
                    <label class="form-label" for="password">密码</label>
                    <input type="password" id="password" class="form-input" placeholder="至少 8 位字符" minlength="8" required>
                    <span class="error-msg" id="passwordError">密码至少需要 8 个字符</span>
                </div>
                
                <div class="form-group" id="confirmPasswordGroup">
                    <label class="form-label" for="confirmPassword">确认密码</label>
                    <input type="password" id="confirmPassword" class="form-input" placeholder="再次输入密码">
                    <span class="error-msg" id="confirmPasswordError">两次输入的密码不一致</span>
                </div>
                
                <button type="submit" class="form-submit" id="submitBtn">登录</button>
            </form>
            
            <div class="login-footer">
                <a href="#">忘记密码？</a>
            </div>
            
            <div class="social-login">
                <span>或</span>
            </div>
            <div class="social-buttons">
                <button class="social-btn" aria-label="微信登录" title="微信登录">💬 微信</button>
                <button class="social-btn" aria-label="Apple 登录" title="Apple 登录">🍎 Apple</button>
            </div>
        </div>
    </div>
    
    <script>
        var currentTab = 'login';
        
        // Tab 切换
        document.getElementById('tabLogin').addEventListener('click', function() {
            switchTab('login');
        });
        document.getElementById('tabRegister').addEventListener('click', function() {
            switchTab('register');
        });
        
        function switchTab(tab) {
            currentTab = tab;
            var confirmGroup = document.getElementById('confirmPasswordGroup');
            var submitBtn = document.getElementById('submitBtn');
            
            document.getElementById('tabLogin').classList.toggle('active', tab === 'login');
            document.getElementById('tabRegister').classList.toggle('active', tab === 'register');
            
            if (tab === 'login') {
                confirmGroup.style.display = 'none';
                submitBtn.textContent = '登录';
            } else {
                confirmGroup.style.display = 'block';
                submitBtn.textContent = '注册';
            }
        }
        
        // 实时验证
        function showError(fieldId, input, isValid) {
            var errorEl = document.getElementById(fieldId);
            if (isValid) {
                input.classList.remove('has-error');
                errorEl.style.display = 'none';
            } else {
                input.classList.add('has-error');
                errorEl.style.display = 'block';
            }
        }
        
        document.getElementById('email').addEventListener('input', function(e) {
            var isValid = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(e.target.value);
            showError('emailError', e.target, isValid);
        });
        
        document.getElementById('password').addEventListener('input', function(e) {
            var isValid = e.target.value.length >= 8;
            showError('passwordError', e.target, isValid);
        });
        
        document.getElementById('confirmPassword').addEventListener('input', function(e) {
            var password = document.getElementById('password').value;
            var isValid = e.target.value === password;
            showError('confirmPasswordError', e.target, isValid);
        });
        
        // 表单提交
        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            var email = document.getElementById('email');
            var password = document.getElementById('password');
            var submitBtn = document.getElementById('submitBtn');
            var isValid = true;
            
            // 邮箱验证
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                showError('emailError', email, false);
                isValid = false;
            }
            
            // 密码验证
            if (password.value.length < 8) {
                showError('passwordError', password, false);
                isValid = false;
            }
            
            // 注册模式额外验证
            if (currentTab === 'register') {
                var confirmPassword = document.getElementById('confirmPassword');
                if (confirmPassword.value !== password.value) {
                    showError('confirmPasswordError', confirmPassword, false);
                    isValid = false;
                }
            }
            
            if (!isValid) return;
            
            // Loading 状态
            submitBtn.disabled = true;
            submitBtn.classList.add('loading');
            submitBtn.textContent = '验证中...';
            
            // TODO: 接入后端 API 认证
            setTimeout(function() {
                window.location.href = 'dashboard.html';
            }, 500);
        });
    </script>
</body>
</html>
