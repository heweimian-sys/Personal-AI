<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知信 — 登录</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="../colors_and_type.css">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style type="text/tailwindcss">
@theme inline {
  --color-mist: #f3f4f6;
  --color-paper: #ffffff;
  --color-surf-blue: #009afc;
  --color-ink: #000000;
  --color-slate-blue: #5b6882;
  --color-silver: #808080;
  --color-hairline: #e5e7eb;
  --font-ui: 'Inter', 'Noto Sans SC', sans-serif;
  --font-display: 'Playfair Display', 'Noto Serif SC', serif;
}
@layer base {
  body {
    background: var(--color-mist);
    font-family: var(--font-ui);
    color: var(--color-ink);
    margin: 0;
    min-height: 100vh;
  }
}
  </style>

  <style>
    .login-bg {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 0;
    }

    .login-glow {
      position: absolute;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: var(--gradient-sky);
      filter: blur(120px);
      opacity: 0.08;
      pointer-events: none;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      z-index: 1;
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .login-card-wrap {
      position: relative;
      max-width: 400px;
      width: 100%;
    }

    .login-dots {
      position: absolute;
      left: -32px;
      top: 50%;
      transform: translateY(-50%);
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 20;
    }

    .login-card {
      background: var(--color-paper);
      border: 1px solid var(--color-hairline);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      padding: 36px;
      position: relative;
      z-index: 10;
    }

    .login-brand {
      text-align: center;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--color-hairline);
      margin-bottom: 24px;
    }

    .login-brand-name {
      font-family: var(--font-display);
      font-size: 34px;
      font-weight: 600;
      color: var(--color-ink);
      margin: 0 0 12px;
      line-height: 1.2;
    }

    .login-brand-dots {
      display: flex;
      justify-content: center;
      gap: 6px;
    }

    /* ── Pill Switcher ── */
    .pill-switcher {
      display: flex;
      gap: 4px;
      border-radius: var(--radius-md);
      border: 1px solid var(--color-hairline);
      padding: 3px;
      margin-bottom: 24px;
    }

    .pill-switcher-item {
      flex: 1;
      padding: 6px 20px;
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: 500;
      border-radius: var(--radius-sm);
      border: none;
      background: transparent;
      color: var(--color-silver);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .pill-switcher-item.active {
      background: var(--color-surf-blue);
      color: #ffffff;
    }

    .pill-switcher-item:not(.active):hover {
      color: var(--color-ink);
      background: var(--color-mist);
    }

    .login-title {
      font-family: var(--font-display);
      font-size: 22px;
      font-weight: 600;
      color: var(--color-ink);
      margin: 0 0 4px;
    }

    .login-sub {
      font-size: var(--text-sm);
      color: var(--color-silver);
      margin: 0 0 24px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-actions {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
    }

    .login-btn {
      width: 100%;
      padding: 12px 22px;
    }

    .login-links {
      display: flex;
      justify-content: space-between;
      width: 100%;
      margin-top: 4px;
    }

    .login-link {
      font-size: var(--text-sm);
      color: var(--color-silver);
      text-decoration: none;
      transition: color 0.2s ease;
    }

    .login-link:hover {
      color: var(--color-surf-blue);
    }

    .divider {
      display: flex;
      align-items: center;
      width: 100%;
      margin: 24px 0;
      gap: 16px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-hairline);
    }

    .divider span {
      font-size: var(--text-xs);
      color: var(--color-ink-muted);
      text-transform: uppercase;
      font-weight: 500;
    }

    .social-btns {
      display: flex;
      flex-direction: column;
      gap: 8px;
      width: 100%;
    }

    .social-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 10px 22px;
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      font-weight: 500;
      color: var(--color-slate-blue);
      background: transparent;
      border: 1px solid var(--color-hairline-strong);
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .social-btn:hover {
      background: var(--color-mist);
      border-color: var(--color-surf-blue);
      color: var(--color-surf-blue);
    }

    @media (max-width: 560px) {
      .login-card { padding: 28px; }
      .login-dots { display: none; }
    }
  </style>
</head>
<body class="bg-noise">

  <div class="login-bg">
    <div class="login-glow"></div>
  </div>

  <div class="login-wrap">
    <div class="login-card-wrap fade-up-in">

      <!-- Breathing dots -->
      <div class="login-dots">
        <div class="breathing-dot"></div>
        <div class="breathing-dot"></div>
        <div class="breathing-dot"></div>
        <div class="breathing-dot"></div>
        <div class="breathing-dot"></div>
      </div>

      <!-- Card -->
      <div class="login-card">

        <div class="login-brand">
          <h1 class="login-brand-name">知信</h1>
          <div class="login-brand-dots">
            <div class="breathing-dot"></div>
            <div class="breathing-dot"></div>
            <div class="breathing-dot"></div>
          </div>
        </div>

        <div class="pill-switcher">
          <button class="pill-switcher-item active">登录</button>
          <button class="pill-switcher-item">注册</button>
        </div>

        <h2 class="login-title">欢迎回来</h2>
        <p class="login-sub">登录以继续使用知信</p>

        <div class="form-group">
          <input type="email" class="input-field" placeholder="邮箱" autocomplete="email">
        </div>

        <div class="form-group">
          <input type="password" class="input-field" placeholder="密码" autocomplete="current-password">
        </div>

        <div class="form-actions">
          <button class="btn-primary login-btn" data-dom-id="login-submit">登录</button>
          <div class="login-links">
            <a href="#" class="login-link">忘记密码？</a>
            <a href="../pages/index.html" class="login-link" data-dom-id="login-back">返回首页 &rarr;</a>
          </div>
        </div>

        <div class="divider">
          <span>或</span>
        </div>

        <div class="social-btns">
          <button class="social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.7 4.3A9.7 9.7 0 0 1 12 4c5.5 0 10 4 10 9a9 9 0 0 1-3.5 7L17 17.6a6 6 0 0 0-10 0L5.5 20A9 9 0 0 1 8.7 4.3z"/></svg>
            微信登录
          </button>
          <button class="social-btn">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.31 3.435 9.795 8.205 11.385.6.105.825-.255.825-.57 0-.285-.015-1.23-.015-2.235-3.015.555-3.795-.735-4.035-1.41-.135-.345-.72-1.41-1.23-1.695-.42-.225-1.02-.78-.015-.795.945-.015 1.62.87 1.845 1.23 1.08 1.815 2.805 1.305 3.495.99.105-.78.42-1.305.765-1.605-2.67-.3-5.46-1.335-5.46-5.925 0-1.305.465-2.385 1.23-3.225-.12-.3-.54-1.53.12-3.18 0 0 1.005-.315 3.3 1.23.96-.27 1.98-.405 3-.405s2.04.135 3 .405c2.295-1.56 3.3-1.23 3.3-1.23.66 1.65.24 2.88.12 3.18.765.84 1.23 1.905 1.23 3.225 0 4.605-2.805 5.625-5.475 5.925.435.375.81 1.095.81 2.22 0 1.605-.015 2.895-.015 3.3 0 .315.225.69.825.57A12.02 12.02 0 0 0 24 12c0-6.63-5.37-12-12-12z"/></svg>
            GitHub 登录
          </button>
        </div>

      </div>
    </div>
  </div>

</body>
</html>
