name: Deploy wow2333 Worker

on:
  push:
    branches:
      - main
    paths:
      - "项目/Cloudflare Workers/wow2333-edgetunnel/**"
      - ".github/workflows/deploy-wow2333-worker.yml"
  workflow_dispatch:
  schedule:
    - cron: "25 19 * * *"

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync upstream Worker on schedule
        id: sync
        if: github.event_name == 'schedule'
        run: |
          set -euo pipefail
          worker_dir="项目/Cloudflare Workers/wow2333-edgetunnel"
          curl -fsSL "https://raw.githubusercontent.com/cmliu/edgetunnel/refs/heads/main/_worker.js" -o "$worker_dir/_worker.js"

          if git diff --quiet -- "$worker_dir/_worker.js"; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No upstream Worker change."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add "$worker_dir/_worker.js"
            git commit -m "chore(wow2333): sync edgetunnel upstream"
            git push
          fi

      - name: Check Worker config
        id: config
        if: github.event_name != 'schedule' || steps.sync.outputs.changed == 'true'
        working-directory: "项目/Cloudflare Workers/wow2333-edgetunnel"
        run: |
          if grep -q "REPLACE_WITH_KV_NAMESPACE_ID" wrangler.toml; then
            echo "::notice::Fill the Cloudflare KV namespace id in wrangler.toml before deployment can run."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            node scripts/check-config.mjs
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy to Cloudflare
        if: (github.event_name != 'schedule' || steps.sync.outputs.changed == 'true') && steps.config.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: "项目/Cloudflare Workers/wow2333-edgetunnel"
          command: deploy
