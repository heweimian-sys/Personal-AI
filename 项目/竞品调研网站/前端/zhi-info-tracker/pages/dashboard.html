<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>知信 - 工作台</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&family=Noto+Serif+SC:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet" media="print" onload="this.media='all'">

    <link rel="stylesheet" href="../colors_and_type.css">

    <style>
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

      /* Layout */
      .dash-layout { display: flex; min-height: 100vh; }

      /* Sidebar */
      .sidebar {
        width: 240px; min-width: 240px; height: 100vh;
        position: fixed; top: 0; left: 0;
        display: flex; flex-direction: column;
        background: var(--color-paper);
        border-right: 1px solid var(--color-hairline);
        z-index: 100;
      }
      .sidebar-logo {
        padding: 24px 20px 20px;
        font-family: var(--font-display); font-size: 20px; font-weight: 600;
        color: var(--color-ink);
        border-bottom: 1px solid var(--color-hairline);
      }
      .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; }
      .sidebar-item {
        display: flex; align-items: center; gap: 10px;
        padding: 9px 12px; border-radius: var(--radius-md);
        font-size: var(--text-sm); font-weight: 400;
        color: var(--color-slate-blue); text-decoration: none;
        transition: all 0.15s ease; white-space: nowrap; overflow: hidden;
        position: relative;
      }
      .sidebar-item:hover { background: var(--color-mist); color: var(--color-ink); }
      .sidebar-item.active { background: var(--color-surf-light); color: var(--color-surf-blue); font-weight: 600; }
      .sidebar-item-icon { width: 18px; height: 18px; flex-shrink: 0; color: var(--color-silver); }
      .sidebar-item.active .sidebar-item-icon { color: var(--color-surf-blue); }
      .sidebar-dot {
        position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
        width: 6px; height: 6px; border-radius: 50%;
        background: var(--color-surf-blue);
        animation: breathe 4s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      }
      .sidebar-user { padding: 16px; border-top: 1px solid var(--color-hairline); display: flex; align-items: center; gap: 10px; }
      .sidebar-avatar {
        width: 32px; height: 32px; border-radius: 50%;
        background: var(--color-surf-subtle); border: 1px solid var(--color-hairline-strong);
        display: flex; align-items: center; justify-content: center;
        font-size: 13px; font-weight: 600; color: var(--color-surf-blue);
      }
      .sidebar-username { font-size: var(--text-sm); font-weight: 500; color: var(--color-ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

      /* Content Area */
      .content-area { flex: 1; margin-left: 240px; min-height: 100vh; position: relative; }
      .top-bar { display: flex; align-items: center; justify-content: space-between; padding: 28px 36px 0; }
      .page-title { font-family: var(--font-display); font-size: 32px; font-weight: 600; line-height: 1.15; letter-spacing: -0.02em; color: var(--color-ink); }
      .top-actions { display: flex; align-items: center; gap: 12px; }
      .search-wrap { position: relative; }
      .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 16px; height: 16px; color: var(--color-ink-muted); }
      .search-input {
        padding: 8px 16px 8px 36px; font-family: var(--font-ui); font-size: var(--text-sm);
        background: var(--color-paper); border: 1px solid var(--color-hairline-strong);
        border-radius: var(--radius-md); color: var(--color-ink); outline: none;
        width: 220px; transition: border-color 0.2s ease, box-shadow 0.2s ease, width 0.2s ease;
      }
      .search-input:focus { border-color: var(--color-surf-blue); box-shadow: 0 0 0 3px var(--color-surf-light); width: 280px; }
      .search-input::placeholder { color: var(--color-ink-muted); }
      .notif-btn {
        width: 36px; height: 36px; display: flex; align-items: center; justify-content: center;
        border: 1px solid var(--color-hairline-strong); border-radius: var(--radius-md);
        cursor: pointer; transition: all 0.15s ease; position: relative;
        color: var(--color-silver); background: var(--color-paper);
      }
      .notif-btn:hover { background: var(--color-mist); color: var(--color-ink); }
      .notif-badge {
        position: absolute; top: 6px; right: 7px; width: 7px; height: 7px;
        border-radius: 50%; background: var(--color-surf-blue); border: 1.5px solid var(--color-paper);
      }

      /* Stats */
      .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; padding: 28px 36px 0; }
      .stat-card {
        padding: 20px 22px; background: var(--color-paper);
        border: 1px solid var(--color-hairline); border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 6px;
        transition: box-shadow 0.2s ease;
      }
      .stat-card:hover { box-shadow: var(--shadow-lg); }
      .stat-label { font-size: var(--text-xs); font-weight: 600; letter-spacing: var(--text-xs-tracking); text-transform: uppercase; color: var(--color-silver); }
      .stat-row { display: flex; align-items: baseline; gap: 10px; }
      .stat-num { font-family: var(--font-display); font-size: 36px; font-weight: 700; line-height: 1; letter-spacing: -0.03em; color: var(--color-ink); }
      .stat-indicator { display: flex; align-items: center; gap: 4px; font-size: var(--text-xs); font-weight: 500; color: var(--state-success); }
      .stat-indicator .dot { width: 5px; height: 5px; border-radius: 50%; background: var(--state-success); }

      /* Feature Grid */
      .feature-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 24px 36px 36px; }
      .dash-card {
        padding: 22px 24px; background: var(--color-paper);
        border: 1px solid var(--color-hairline); border-radius: var(--radius-lg);
        box-shadow: var(--shadow-sm); display: flex; flex-direction: column; gap: 14px;
        transition: box-shadow 0.2s ease;
      }
      .dash-card:hover { box-shadow: var(--shadow-lg); }
      .dash-card.full { grid-column: 1 / -1; }
      .card-header { display: flex; align-items: center; justify-content: space-between; }
      .card-title { font-family: var(--font-display); font-size: var(--text-xl); font-weight: 600; color: var(--color-ink); }
      .card-link { font-size: var(--text-xs); font-weight: 500; color: var(--color-silver); text-decoration: none; transition: color 0.2s ease; }
      .card-link:hover { color: var(--color-surf-blue); }

      /* Updates */
      .updates-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 4px; }
      .updates-scroll::-webkit-scrollbar { height: 4px; }
      .updates-scroll::-webkit-scrollbar-thumb { background: var(--color-hairline-strong); border-radius: var(--radius-full); }
      .update-item {
        min-width: 220px; max-width: 260px; padding: 14px 16px; flex-shrink: 0;
        background: var(--color-mist); border: 1px solid var(--color-hairline);
        border-radius: var(--radius-md); cursor: pointer; transition: box-shadow 0.2s ease;
      }
      .update-item:hover { box-shadow: var(--shadow-md); }
      .update-title {
        font-size: var(--text-sm); font-weight: 600; color: var(--color-ink);
        line-height: 1.4; margin-bottom: 8px;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
      }
      .update-meta { display: flex; align-items: center; gap: 8px; font-size: var(--text-xs); color: var(--color-silver); }
      .update-source { color: var(--color-slate-blue); font-weight: 500; }

      /* Topics & Actions */
      .topics-wrap { display: flex; flex-wrap: wrap; gap: 8px; }
      .actions-wrap { display: flex; gap: 10px; flex-wrap: wrap; }
      .action-btn {
        display: inline-flex; align-items: center; gap: 6px; padding: 10px 20px;
        font-size: var(--text-sm); font-weight: 500; border: none; border-radius: var(--radius-md);
        cursor: pointer; transition: opacity 0.2s ease; color: #ffffff;
      }
      .action-btn:hover { opacity: 0.9; }

      /* Sky Glow */
      .sky-glow {
        position: absolute; top: -80px; right: -60px; width: 320px; height: 320px;
        border-radius: 50%; background: var(--gradient-sky); filter: blur(100px);
        opacity: 0.06; pointer-events: none; z-index: 0;
      }

      /* Hamburger */
      .hamburger {
        display: none; width: 36px; height: 36px; align-items: center; justify-content: center;
        border: 1px solid var(--color-hairline-strong); border-radius: var(--radius-sm);
        background: var(--color-paper); cursor: pointer; flex-shrink: 0;
      }
      .mobile-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.06); z-index: 90; }

      /* Responsive */
      @media (max-width: 1024px) {
        .sidebar { width: 64px; min-width: 64px; }
        .sidebar-logo { padding: 20px 14px 16px; text-align: center; font-size: 16px; }
        .feature-grid { padding: 20px 24px 24px; }
        .top-bar { padding: 24px 24px 0; }
      }
      @media (max-width: 768px) {
        .hamburger { display: flex; }
        .sidebar { width: 240px; min-width: 240px; transform: translateX(-100%); transition: transform 0.3s ease; }
</head>
<body class="bg-noise">
<div class="dash-layout">

</div>

<script>
    var sidebar = document.getElementById('sidebar');
    var overlay = document.getElementById('mobileOverlay');
    var hamburger = document.getElementById('hamburgerBtn');
    if (hamburger) {
        hamburger.addEventListener('click', function() {
            sidebar.classList.toggle('open');
            overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
        });
    }
    if (overlay) {
        overlay.addEventListener('click', function() {
            sidebar.classList.remove('open');
            overlay.style.display = 'none';
        });
    }
})();
</script>
